<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コマ割ジェネレーター</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --paper: #F7F5F0;
    --ink: #1A1A1A;
    --ink-light: #5A5754;
    --border: #C8C4BC;
    --border-light: #E8E4DC;
    --red: #C0392B;
    --red-light: #F5ECEA;
    --mono: 'Courier New', monospace;
    --serif: Georgia, serif;
    --sans: system-ui, sans-serif;
  }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    height: 100vh;
    display: grid;
    grid-template-rows: 52px 1fr;
    overflow: hidden;
  }

  header {
    border-bottom: 2px solid var(--ink);
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .logo {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .logo span { color: var(--red); }

  .tagline {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-light);
    letter-spacing: 0.06em;
  }

  .main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
  }

  /* 左パネル */
  .left {
    border-right: 1.5px solid var(--ink);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .pane-head {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--ink-light);
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .meta {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-light);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    flex-shrink: 0;
  }

  .meta-full { grid-column: 1 / -1; }

  .field label {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-light);
    margin-bottom: 3px;
    letter-spacing: 0.06em;
  }

  .field input, .field select {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    padding: 5px 8px;
    font-family: var(--sans);
    font-size: 12px;
    color: var(--ink);
    outline: none;
  }

  .field input:focus, .field select:focus {
    border-color: var(--ink);
  }

  .script-wrap {
    flex: 1;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow: hidden;
    min-height: 0;
  }

  .script-wrap label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-light);
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }

  textarea {
    flex: 1;
    resize: none;
    background: transparent;
    border: 1px solid var(--border);
    padding: 10px;
    font-family: var(--serif);
    font-size: 12px;
    line-height: 1.8;
    color: var(--ink);
    outline: none;
    min-height: 0;
  }

  textarea:focus { border-color: var(--ink); }
  textarea::placeholder { color: var(--border); font-style: italic; }

  .btn-area {
    padding: 12px 16px;
    border-top: 1px solid var(--border-light);
    flex-shrink: 0;
  }

  .note {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-light);
    line-height: 1.6;
    padding: 6px 8px;
    border-left: 2px solid var(--border);
    margin-bottom: 8px;
  }

  .btn {
    width: 100%;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 12px;
    font-family: var(--serif);
    font-size: 13px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn:hover:not(:disabled) { background: var(--red); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .dot {
    width: 5px; height: 5px;
    background: var(--paper);
    border-radius: 50%;
    animation: blink 1s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }

  /* 右パネル */
  .right {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .tab {
    padding: 9px 14px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    color: var(--ink-light);
    margin-bottom: -1px;
  }

  .tab.on { color: var(--ink); border-bottom-color: var(--ink); }

  .out {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    min-height: 0;
  }

  .tc { display: none; }
  .tc.on { display: block; }

  /* 空状態 */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 14px;
  }

  .empty-grid {
    display: grid;
    grid-template-columns: repeat(3, 40px);
    grid-template-rows: repeat(2, 28px);
    gap: 3px;
  }

  .ec { border: 1.5px solid var(--border-light); }

  .empty-txt {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--border);
  }

  /* ページブロック */
  .page-block {
    margin-bottom: 20px;
    border: 1.5px solid var(--ink);
  }

  .page-hd {
    background: var(--ink);
    color: var(--paper);
    padding: 6px 12px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    display: flex;
    justify-content: space-between;
  }

  .panel-row {
    border-bottom: 1px solid var(--border-light);
    padding: 12px 14px;
    display: grid;
    grid-template-columns: 64px 1fr;
    gap: 10px;
  }

  .panel-row:last-child { border-bottom: none; }

  .pm { display: flex; flex-direction: column; gap: 3px; }

  .pnum {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 700;
    color: var(--red);
    line-height: 1;
  }

  .psz {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--ink-light);
    line-height: 1.4;
  }

  .pc { display: flex; flex-direction: column; gap: 6px; }

  .pbg {
    font-family: var(--serif);
    font-size: 11px;
    line-height: 1.8;
    color: var(--ink);
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--border-light);
  }

  .ptexts { display: flex; flex-direction: column; gap: 3px; }

  .ti {
    font-size: 11px;
    line-height: 1.7;
    display: flex;
    gap: 5px;
    align-items: flex-start;
  }

  .tt {
    font-family: var(--mono);
    font-size: 9px;
    padding: 1px 4px;
    border: 1px solid;
    white-space: nowrap;
    margin-top: 2px;
    flex-shrink: 0;
  }

  .tt.n { border-color: var(--border); color: var(--ink-light); }
  .tt.s { border-color: var(--ink); color: var(--ink); }
  .tt.m { border-color: var(--red); color: var(--red); }

  /* MJプロンプト */
  .mj {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--border-light);
  }

  .mjl {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--ink-light);
    letter-spacing: 0.06em;
    margin-bottom: 3px;
  }

  .mjp {
    background: var(--border-light);
    padding: 6px 8px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink);
    line-height: 1.6;
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
    word-break: break-all;
  }

  .mjp:hover { background: var(--border); }

  .mjc {
    position: absolute;
    top: 3px;
    right: 6px;
    font-size: 9px;
    color: var(--ink-light);
    font-family: var(--mono);
  }

  /* エラー */
  .err {
    background: var(--red-light);
    border: 1px solid var(--red);
    padding: 10px 14px;
    font-size: 12px;
    color: var(--red);
    font-family: var(--mono);
    line-height: 1.6;
  }

  /* RAW */
  .raw {
    font-family: var(--mono);
    font-size: 10px;
    line-height: 1.7;
    color: var(--ink-light);
    white-space: pre-wrap;
    word-break: break-all;
  }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<header>
  <div class="logo">コマ<span>割</span>ジェネレーター</div>
  <div class="tagline">SCRIPT → PANEL COMPOSITION + MIDJOURNEY PROMPTS</div>
</header>

<div class="main">

  <!-- 左：入力 -->
  <div class="left">
    <div class="pane-head">
      <span>台本入力</span>
      <span id="statusLabel" style="color:var(--ink-light)"></span>
    </div>

    <div class="meta">
      <div class="field">
        <label>話数</label>
        <input type="text" id="episode" value="第1話">
      </div>
      <div class="field">
        <label>ページ数</label>
        <select id="pageCount">
          <option value="8" selected>8ページ</option>
          <option value="4">4ページ</option>
          <option value="12">12ページ</option>
          <option value="16">16ページ</option>
        </select>
      </div>
      <div class="field meta-full">
        <label>キャラクター設定</label>
        <input type="text" id="charSetting" value="顔なし・ラフな線画・5〜6頭身・感情は体で表現">
      </div>
    </div>

    <div class="script-wrap">
      <label>台本テキスト</label>
      <textarea id="scriptInput" placeholder="PAGE 1&#10;背景：深夜のワンルーム。スマートフォンの画面だけが光っている。&#10;ナレーション：審査制マッチングアプリというものがある。&#10;ナレーション：私は最底辺ギリギリで、通過した。&#10;&#10;PAGE 2&#10;コマ1：会社のデスク。PCにグラフが並んでいる。後ろ姿。&#10;ナレーション：ゆうど。30代。データアナリスト。"></textarea>
    </div>

    <div class="btn-area">
      <div class="note">
        独白性重視 / 起承転結なし / 感情説明なし<br>
        出来事と数字を淡々と並べる構成で出力します
      </div>
      <button class="btn" id="genBtn" onclick="generate()">
        コマ構成を生成する
      </button>
    </div>
  </div>

  <!-- 右：出力 -->
  <div class="right">
    <div class="pane-head">コマ構成 + Midjourneyプロンプト</div>

    <div class="tabs">
      <button class="tab on" onclick="switchTab('visual',this)">コマ構成</button>
      <button class="tab" onclick="switchTab('raw',this)">RAW JSON</button>
    </div>

    <div class="out">
      <div class="tc on" id="tc-visual">
        <div class="empty" id="emptyState">
          <div class="empty-grid">
            <div class="ec"></div><div class="ec"></div><div class="ec"></div>
            <div class="ec"></div><div class="ec"></div><div class="ec"></div>
          </div>
          <div class="empty-txt">台本を入力して生成してください</div>
        </div>
        <div id="visual" style="display:none"></div>
      </div>
      <div class="tc" id="tc-raw">
        <pre class="raw" id="rawOut">—</pre>
      </div>
    </div>
  </div>

</div>

<script>
const SYSTEM = `あなたはエッセイ漫画のコマ構成専門家です。
台本を受け取り、以下のルールに従ってコマ構成をJSONのみで出力してください。
前置き・説明・コードブロック記号は一切不要です。JSONだけを返してください。

【絶対ルール】
- 感情の説明・比喩表現・総括を一切入れない
- 起承転結・クライマックス・感情の山を作らない
- 出来事と数字だけを淡々と並べる
- ナレーションに「だから」「しかし」「ついに」を使わない
- コマとコマのあいだに因果関係を作らない
- 読者が意味を読み取る余白を必ず残す

【出力JSON形式】
{
  "pages": [
    {
      "page": 1,
      "layout": "コマ配置の説明",
      "panels": [
        {
          "panel": 1,
          "size": "コマサイズ",
          "background": "背景・場面描写（最小限）",
          "texts": [
            {"type": "ナレ", "text": "テキスト"},
            {"type": "セリフ", "text": "テキスト"},
            {"type": "モノローグ", "text": "テキスト"}
          ],
          "mj_prompt": "simple rough sketch line art, faceless character no facial features, 5-6 head ratio, essay manga style, black ink white background, no screentone, [scene description in English] --cw 100 --ar 3:4"
        }
      ]
    }
  ]
}`;

async function generate() {
  const script = document.getElementById('scriptInput').value.trim();
  if (!script) { alert('台本を入力してください'); return; }

  const episode = document.getElementById('episode').value;
  const pages   = document.getElementById('pageCount').value;
  const charSet = document.getElementById('charSetting').value;

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  document.getElementById('statusLabel').textContent = '生成中...';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('visual').style.display = 'none';
  document.getElementById('rawOut').textContent = '—';

  const userMsg = `【${episode}】${pages}ページ構成\nキャラクター設定：${charSet}\n\n台本：\n${script}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 4000,
        system: SYSTEM,
        messages: [{ role: 'user', content: userMsg }]
      })
    });

    if (!res.ok) {
      const e = await res.json();
      throw new Error(e.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const raw  = data.content.map(c => c.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    document.getElementById('rawOut').textContent = JSON.stringify(parsed, null, 2);
    renderVisual(parsed);
    document.getElementById('statusLabel').textContent = `${parsed.pages.length}P 生成完了`;

  } catch(err) {
    document.getElementById('emptyState').style.display = 'none';
    const v = document.getElementById('visual');
    v.innerHTML = `<div class="err">エラー：${err.message}<br><br>台本の入力内容を確認してください。</div>`;
    v.style.display = 'block';
    document.getElementById('statusLabel').textContent = 'エラー';
    console.error(err);
  }

  btn.disabled = false;
  btn.textContent = 'コマ構成を生成する';
}

function renderVisual(data) {
  const container = document.getElementById('visual');
  container.innerHTML = '';

  (data.pages || []).forEach(page => {
    const block = document.createElement('div');
    block.className = 'page-block';

    const hd = document.createElement('div');
    hd.className = 'page-hd';
    hd.innerHTML = `<span>PAGE ${page.page}</span><span>${page.layout || ''}</span>`;
    block.appendChild(hd);

    (page.panels || []).forEach(panel => {
      const row = document.createElement('div');
      row.className = 'panel-row';

      const pm = document.createElement('div');
      pm.className = 'pm';
      pm.innerHTML = `<div class="pnum">コマ${panel.panel}</div><div class="psz">${panel.size || ''}</div>`;

      const pc = document.createElement('div');
      pc.className = 'pc';

      if (panel.background) {
        const bg = document.createElement('div');
        bg.className = 'pbg';
        bg.textContent = panel.background;
        pc.appendChild(bg);
      }

      if (panel.texts?.length) {
        const pt = document.createElement('div');
        pt.className = 'ptexts';
        panel.texts.forEach(t => {
          const ti = document.createElement('div');
          ti.className = 'ti';
          const cls = t.type === 'ナレ' ? 'n' : t.type === 'セリフ' ? 's' : 'm';
          ti.innerHTML = `<span class="tt ${cls}">${t.type}</span><span>${t.text}</span>`;
          pt.appendChild(ti);
        });
        pc.appendChild(pt);
      }

      if (panel.mj_prompt) {
        const mj = document.createElement('div');
        mj.className = 'mj';
        const mjp = document.createElement('div');
        mjp.className = 'mjp';
        mjp.innerHTML = `<span class="mjc">クリックでコピー</span>${panel.mj_prompt}`;
        mjp.onclick = () => {
          navigator.clipboard.writeText(panel.mj_prompt).then(() => {
            const c = mjp.querySelector('.mjc');
            c.textContent = 'コピー済み ✓';
            setTimeout(() => c.textContent = 'クリックでコピー', 1500);
          });
        };
        mj.innerHTML = '<div class="mjl">MIDJOURNEY PROMPT</div>';
        mj.appendChild(mjp);
        pc.appendChild(mj);
      }

      row.appendChild(pm);
      row.appendChild(pc);
      block.appendChild(row);
    });

    container.appendChild(block);
  });

  container.style.display = 'block';
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.tc').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('tc-' + name).classList.add('on');
}
</script>
</body>
</html>
