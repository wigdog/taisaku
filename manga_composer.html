<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コマ構成ジェネレーター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --paper: #F7F5F0;
    --ink: #1A1A1A;
    --ink-light: #4A4744;
    --border: #C8C4BC;
    --border-light: #E8E4DC;
    --red: #C0392B;
    --red-light: #F5ECEA;
    --mono: 'JetBrains Mono', monospace;
    --serif: 'Noto Serif JP', serif;
    --sans: 'Noto Sans JP', sans-serif;
  }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr;
    gap: 0;
  }

  /* ヘッダー */
  header {
    grid-column: 1 / -1;
    border-bottom: 2px solid var(--ink);
    padding: 16px 24px;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  .logo {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .logo span {
    color: var(--red);
  }

  .tagline {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-light);
    letter-spacing: 0.08em;
  }

  /* 左パネル：入力 */
  .input-panel {
    border-right: 1.5px solid var(--ink);
    display: flex;
    flex-direction: column;
    height: calc(100vh - 57px);
  }

  .panel-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-light);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .panel-label {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-label::before {
    content: '';
    display: block;
    width: 8px;
    height: 8px;
    border: 1.5px solid var(--ink);
    background: transparent;
  }

  /* メタ情報 */
  .meta-section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-light);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .meta-field label {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-light);
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }

  .meta-field input, .meta-field select {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    padding: 6px 8px;
    font-family: var(--sans);
    font-size: 13px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }

  .meta-field input:focus, .meta-field select:focus {
    border-color: var(--ink);
  }

  /* 台本入力エリア */
  .script-area {
    flex: 1;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow: hidden;
  }

  .script-area label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-light);
    letter-spacing: 0.08em;
  }

  .script-textarea {
    flex: 1;
    resize: none;
    background: transparent;
    border: 1px solid var(--border);
    padding: 12px;
    font-family: var(--serif);
    font-size: 13px;
    line-height: 1.9;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }

  .script-textarea:focus {
    border-color: var(--ink);
  }

  .script-textarea::placeholder {
    color: var(--border);
    font-style: italic;
  }

  /* 生成ボタン */
  .generate-section {
    padding: 16px 20px;
    border-top: 1px solid var(--border-light);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .style-note {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-light);
    line-height: 1.6;
    padding: 8px 10px;
    border-left: 2px solid var(--border);
  }

  .generate-btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 14px;
    font-family: var(--serif);
    font-size: 14px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .generate-btn:hover:not(:disabled) {
    background: var(--red);
  }

  .generate-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .loading-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--paper);
    border-radius: 50%;
    animation: pulse 1s ease-in-out infinite;
  }

  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* 右パネル：出力 */
  .output-panel {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 57px);
    overflow: hidden;
  }

  .output-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  /* 空状態 */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--border);
  }

  .empty-grid {
    display: grid;
    grid-template-columns: repeat(3, 48px);
    grid-template-rows: repeat(2, 32px);
    gap: 4px;
  }

  .empty-cell {
    border: 1.5px solid var(--border-light);
  }

  .empty-text {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--border);
  }

  /* ページ出力 */
  .page-block {
    margin-bottom: 28px;
    border: 1.5px solid var(--ink);
  }

  .page-header {
    background: var(--ink);
    color: var(--paper);
    padding: 8px 14px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    display: flex;
    justify-content: space-between;
  }

  .page-body {
    padding: 0;
  }

  /* コマ */
  .panel-item {
    border-bottom: 1px solid var(--border-light);
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 12px;
  }

  .panel-item:last-child {
    border-bottom: none;
  }

  .panel-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .panel-num {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
    color: var(--red);
    line-height: 1;
  }

  .panel-size {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-light);
    line-height: 1.4;
  }

  .panel-content {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .panel-bg {
    font-family: var(--serif);
    font-size: 12px;
    line-height: 1.8;
    color: var(--ink);
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--border-light);
  }

  .panel-texts {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .text-item {
    font-size: 12px;
    line-height: 1.7;
    display: flex;
    gap: 6px;
  }

  .text-type {
    font-family: var(--mono);
    font-size: 10px;
    padding: 1px 5px;
    border: 1px solid;
    white-space: nowrap;
    height: fit-content;
    margin-top: 2px;
  }

  .text-type.nare { border-color: var(--border); color: var(--ink-light); }
  .text-type.serif { border-color: var(--ink); color: var(--ink); }
  .text-type.mono { border-color: var(--red); color: var(--red); font-style: italic; }

  .text-body { color: var(--ink); }

  /* Midjourneyプロンプト */
  .mj-section {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border-light);
  }

  .mj-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--ink-light);
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }

  .mj-prompt {
    background: var(--border-light);
    padding: 8px 10px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink);
    line-height: 1.6;
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
    word-break: break-all;
  }

  .mj-prompt:hover {
    background: var(--border);
  }

  .mj-copy {
    position: absolute;
    top: 4px;
    right: 6px;
    font-size: 9px;
    color: var(--ink-light);
    font-family: var(--mono);
  }

  /* エラー */
  .error-msg {
    background: var(--red-light);
    border: 1px solid var(--red);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--red);
    font-family: var(--mono);
  }

  /* タブ */
  .output-tabs {
    display: flex;
    border-bottom: 1.5px solid var(--border);
  }

  .tab-btn {
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    color: var(--ink-light);
    margin-bottom: -1.5px;
    transition: color 0.15s;
  }

  .tab-btn.active {
    color: var(--ink);
    border-bottom-color: var(--ink);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* raw JSON */
  .raw-json {
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.7;
    color: var(--ink-light);
    white-space: pre-wrap;
    padding: 16px;
    word-break: break-all;
  }

  /* スクロールバー */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); }

  @media (max-width: 768px) {
    body { grid-template-columns: 1fr; }
    .input-panel { height: auto; border-right: none; border-bottom: 1.5px solid var(--ink); }
    .output-panel { height: 80vh; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">コマ<span>割</span>ジェネレーター</div>
  <div class="tagline">SCRIPT → PANEL COMPOSITION + MIDJOURNEY PROMPTS</div>
</header>

<!-- 左：入力 -->
<div class="input-panel">
  <div class="panel-header">
    <div class="panel-label">台本入力</div>
  </div>

  <div class="meta-section">
    <div class="meta-field">
      <label>話数</label>
      <input type="text" id="episode" placeholder="第1話" value="第1話">
    </div>
    <div class="meta-field">
      <label>ページ数</label>
      <select id="pageCount">
        <option value="8" selected>8ページ</option>
        <option value="4">4ページ</option>
        <option value="12">12ページ</option>
        <option value="16">16ページ</option>
      </select>
    </div>
    <div class="meta-field" style="grid-column: 1/-1">
      <label>キャラクター設定</label>
      <input type="text" id="charSetting" placeholder="顔なし・ラフな線画・5〜6頭身・感情は体で表現" value="顔なし・ラフな線画・5〜6頭身・感情は体で表現">
    </div>
  </div>

  <div class="script-area">
    <label>台本テキスト（ページ・コマ単位で記述）</label>
    <textarea class="script-textarea" id="scriptInput" placeholder="PAGE 1
背景：深夜のワンルーム。スマートフォンの画面だけが光っている。
ナレーション：審査制マッチングアプリというものがある。
ナレーション：私は最底辺ギリギリで、通過した。

PAGE 2
コマ1：会社のデスク。PCにグラフが並んでいる。後ろ姿。
ナレーション：ゆうど。30代。データアナリスト。

コマ2：深夜の部屋。ベッドに一人で座っている。
ナレーション：35歳になった。彼女がいない。"></textarea>
  </div>

  <div class="generate-section">
    <div class="style-note">
      独白性重視 / 起承転結なし / 感情説明なし<br>
      出来事と数字を淡々と並べる構成で出力します
    </div>
    <button class="generate-btn" id="generateBtn" onclick="generate()">
      コマ構成を生成する
    </button>
  </div>
</div>

<!-- 右：出力 -->
<div class="output-panel">
  <div class="panel-header">
    <div class="panel-label">コマ構成 + Midjourneyプロンプト</div>
    <div id="statusLabel" style="font-family:var(--mono);font-size:10px;color:var(--ink-light)"></div>
  </div>

  <div class="output-tabs">
    <button class="tab-btn active" onclick="switchTab('visual')">コマ構成</button>
    <button class="tab-btn" onclick="switchTab('raw')">RAW JSON</button>
  </div>

  <div class="output-content">
    <div class="tab-content active" id="tab-visual">
      <div class="empty-state" id="emptyState">
        <div class="empty-grid">
          <div class="empty-cell"></div><div class="empty-cell"></div><div class="empty-cell"></div>
          <div class="empty-cell"></div><div class="empty-cell"></div><div class="empty-cell"></div>
        </div>
        <div class="empty-text">台本を入力して生成してください</div>
      </div>
      <div id="outputVisual" style="display:none"></div>
    </div>
    <div class="tab-content" id="tab-raw">
      <pre class="raw-json" id="outputRaw">—</pre>
    </div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `あなたはエッセイ漫画のコマ構成専門家です。
台本を受け取り、以下のルールに従ってコマ構成をJSONで出力してください。

【絶対ルール】
- 感情の説明・比喩表現・総括を一切入れない
- 起承転結・クライマックス・感情の山を作らない
- 出来事と数字だけを淡々と並べる
- ナレーションに「だから」「しかし」「ついに」を使わない
- コマとコマのあいだに因果関係を作らない
- 読者が意味を読み取る余白を必ず残す

【出力形式】JSON only、余分なテキスト不要

{
  "pages": [
    {
      "page": 1,
      "layout": "コマ配置の説明（例：全ページ1コマ、上1/3+中1/3+下1/3 の3コマ）",
      "panels": [
        {
          "panel": 1,
          "size": "コマサイズ（例：全ページ縦長、上1/3横長、左下小）",
          "background": "背景・場面描写（最小限の情報のみ）",
          "texts": [
            {"type": "ナレ", "text": "テキスト"},
            {"type": "セリフ", "text": "テキスト"},
            {"type": "モノローグ", "text": "テキスト"}
          ],
          "mj_prompt": "Midjourney用英語プロンプト。キャラ設定と作風を含む。--cref [REF_URL] --sref [STYLE_URL] --cw 100 --ar 3:4 形式で終わる"
        }
      ]
    }
  ]
}

Midjourneyプロンプトの作風指定：
simple rough sketch line art, faceless character (no eyes nose mouth), 
5-6 head ratio, minimal details, essay manga style, black ink white background, 
no screentone, no fill, rough scratchy lines`;

async function generate() {
  const script = document.getElementById('scriptInput').value.trim();
  if (!script) { alert('台本を入力してください'); return; }

  const episode = document.getElementById('episode').value;
  const pageCount = document.getElementById('pageCount').value;
  const charSetting = document.getElementById('charSetting').value;

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>';
  document.getElementById('statusLabel').textContent = '生成中...';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('outputVisual').style.display = 'none';
  document.getElementById('outputRaw').textContent = '—';

  const userPrompt = `【${episode}】${pageCount}ページ構成
キャラクター設定：${charSetting}

台本：
${script}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 4000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });

    const data = await res.json();
    const raw = data.content.map(c => c.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    document.getElementById('outputRaw').textContent = JSON.stringify(parsed, null, 2);
    renderVisual(parsed, episode);
    document.getElementById('statusLabel').textContent = `${parsed.pages.length}ページ生成完了`;

  } catch (err) {
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('outputVisual').innerHTML = `<div class="error-msg">エラー：${err.message}</div>`;
    document.getElementById('outputVisual').style.display = 'block';
    document.getElementById('statusLabel').textContent = 'エラー';
    console.error(err);
  }

  btn.disabled = false;
  btn.textContent = 'コマ構成を生成する';
}

function renderVisual(data, episode) {
  const container = document.getElementById('outputVisual');
  container.innerHTML = '';

  data.pages.forEach(page => {
    const block = document.createElement('div');
    block.className = 'page-block';

    const header = document.createElement('div');
    header.className = 'page-header';
    header.innerHTML = `<span>PAGE ${page.page}</span><span>${page.layout || ''}</span>`;
    block.appendChild(header);

    const body = document.createElement('div');
    body.className = 'page-body';

    (page.panels || []).forEach(panel => {
      const item = document.createElement('div');
      item.className = 'panel-item';

      const meta = document.createElement('div');
      meta.className = 'panel-meta';
      meta.innerHTML = `
        <div class="panel-num">コマ${panel.panel}</div>
        <div class="panel-size">${panel.size || ''}</div>
      `;

      const content = document.createElement('div');
      content.className = 'panel-content';

      if (panel.background) {
        const bg = document.createElement('div');
        bg.className = 'panel-bg';
        bg.textContent = panel.background;
        content.appendChild(bg);
      }

      if (panel.texts && panel.texts.length) {
        const texts = document.createElement('div');
        texts.className = 'panel-texts';
        panel.texts.forEach(t => {
          const ti = document.createElement('div');
          ti.className = 'text-item';
          const typeClass = t.type === 'ナレ' ? 'nare' : t.type === 'セリフ' ? 'serif' : 'mono';
          ti.innerHTML = `<span class="text-type ${typeClass}">${t.type}</span><span class="text-body">${t.text}</span>`;
          texts.appendChild(ti);
        });
        content.appendChild(texts);
      }

      if (panel.mj_prompt) {
        const mjSec = document.createElement('div');
        mjSec.className = 'mj-section';
        mjSec.innerHTML = `<div class="mj-label">MIDJOURNEY PROMPT</div>`;
        const prompt = document.createElement('div');
        prompt.className = 'mj-prompt';
        prompt.innerHTML = `<span class="mj-copy">クリックでコピー</span>${panel.mj_prompt}`;
        prompt.onclick = () => {
          navigator.clipboard.writeText(panel.mj_prompt);
          prompt.querySelector('.mj-copy').textContent = 'コピーしました';
          setTimeout(() => prompt.querySelector('.mj-copy').textContent = 'クリックでコピー', 1500);
        };
        mjSec.appendChild(prompt);
        content.appendChild(mjSec);
      }

      item.appendChild(meta);
      item.appendChild(content);
      body.appendChild(item);
    });

    block.appendChild(body);
    container.appendChild(block);
  });

  container.style.display = 'block';
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && name === 'visual') || (i === 1 && name === 'raw'));
  });
  document.getElementById('tab-visual').classList.toggle('active', name === 'visual');
  document.getElementById('tab-raw').classList.toggle('active', name === 'raw');
}
</script>
</body>
</html>
